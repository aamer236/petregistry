kind = "web"
previewPath = "/"
title = "PetRetriever"
version = "1.0.0"
id = "artifacts/petretriever"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23723

[services.development]
run = "pnpm --filter @workspace/petretriever run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/petretriever", "run", "build" ]
publicDir = "artifacts/petretriever/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23723"
BASE_PATH = "/"
